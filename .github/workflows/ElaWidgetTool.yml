name: Build ElaWidgetTools (Qt6.7)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout ElaWidgetTools source
      uses: actions/checkout@v4
      with:
        repository: Liniyous/ElaWidgetTools   # 👈 正确的仓库
        ref: main
        submodules: false   # 该仓库无子模块（可省略或设为 false）

    - name: Install Qt 6.7.0
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: ''

    - name: Configure CMake
      run: |
        cmake -S . -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" `
          -DCMAKE_INSTALL_PREFIX="./install" `
          -DBUILD_SHARED_LIBS=ON `
          -G "Visual Studio 17 2022" -A x64

    - name: Build and Install
      run: |
        cmake --build build --config Release --target INSTALL --parallel 4

    - name: Package Binaries
      run: |
        # 创建发布目录结构
        $pkg = "release_package"
        mkdir "$pkg/bin", "$pkg/lib", "$pkg/include"

        # 复制头文件（来自仓库根目录 include/）
        if (Test-Path "include") {
          Copy-Item -Recurse "include/*" -Destination "$pkg/include/"
        }

        # 复制 .dll 和 .lib（来自 build/ElaWidgetTools/Release/）
        $binDir = "build/ElaWidgetTools/Release"
        if (Test-Path $binDir) {
          Copy-Item "$binDir/*.dll" -Destination "$pkg/bin/" -ErrorAction SilentlyContinue
          Copy-Item "$binDir/*.lib" -Destination "$pkg/lib/" -ErrorAction SilentlyContinue
        }

        # 打包
        Compress-Archive -Path "$pkg/*" -DestinationPath "ElaWidgetTools-Qt6.7-MSVC2022.zip"

        # 调试：确认 zip 存在
        if (Test-Path "ElaWidgetTools-Qt6.7-MSVC2022.zip") {
          Write-Host "✅ ZIP created successfully!" -ForegroundColor Green
          Get-Item "ElaWidgetTools-Qt6.7-MSVC2022.zip"
        } else {
          Write-Host "❌ ZIP NOT FOUND!" -ForegroundColor Red
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ElaWidgetTools-Binaries
        path: ElaWidgetTools-Qt6.7-MSVC2022.zip

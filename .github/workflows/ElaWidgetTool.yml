name: Build ElaWidgetTools (Qt6.7)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout ElaWidgetTools source
      uses: actions/checkout@v4
      with:
        repository: Liniyous/ElaWidgetTools   # 👈 正确的仓库
        ref: main
        submodules: false   # 该仓库无子模块（可省略或设为 false）

    - name: Install Qt 6.7.0
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: ''

    - name: Configure CMake
      run: |
        cmake -S . -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" `
          -DCMAKE_INSTALL_PREFIX="./install" `
          -DBUILD_SHARED_LIBS=ON `
          -G "Visual Studio 17 2022" -A x64

    - name: Build and Install
      run: |
        cmake --build build --config Release --target INSTALL --parallel 4

    - name: Package Binaries
      run: |
        mkdir release_package
        if (Test-Path "install/include") { Copy-Item -Recurse -Path "install/include" -Destination "release_package/" }
        if (Test-Path "install/lib") { Copy-Item -Path "install/lib/*.lib" -Destination "release_package/" }
        if (Test-Path "install/bin") { Copy-Item -Path "install/bin/*.dll" -Destination "release_package/" }
        Compress-Archive -Path "release_package/*" -DestinationPath "ElaWidgetTools-Qt6.7-MSVC2022.zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ElaWidgetTools-Binaries
        path: ElaWidgetTools-Qt6.7-MSVC2022.zip
